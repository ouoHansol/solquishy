<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fff9ed" />
    <title>난 무슨 슬랑이일까?</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        function showBootError(message) {
          var root = document.getElementById("root");
          if (!root || root.childElementCount > 0) return;
          root.innerHTML =
            '<div style="min-height:100vh;display:grid;place-content:center;padding:24px;text-align:center;font-family:sans-serif;color:#3c211b">' +
            '<strong style="font-size:20px">앱을 불러오지 못했어요</strong>' +
            '<p style="line-height:1.6;color:#72594c">토스 앱을 완전히 닫았다가 다시 열어주세요.</p>' +
            '<small style="color:#a07b68">' + String(message || "BOOT_TIMEOUT").slice(0, 120) + '</small></div>';
        }
        window.__slangiBootTimer = window.setTimeout(function () { showBootError("BOOT_TIMEOUT"); }, 5000);
        window.addEventListener("error", function (event) { showBootError(event.message || "SCRIPT_ERROR"); });
        window.addEventListener("unhandledrejection", function (event) {
          showBootError(event.reason && event.reason.message ? event.reason.message : "PROMISE_ERROR");
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
